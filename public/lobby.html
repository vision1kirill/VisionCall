<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VisionCall — Предпросмотр</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="style.css">
</head>
<body class="lobby-page">

<div class="lobby-card">

  <div class="lobby-header">
    <div class="logo-text">VisionCall</div>
    <div class="lobby-user" id="lobbyUser">
      <div class="lobby-user-avatar" id="lobbyAvatar"></div>
      <span id="lobbyName"></span>
    </div>
  </div>

  <!-- Превью камеры -->
  <div class="lobby-preview" id="lobbyPreview">
    <div class="lobby-preview-off" id="previewOff">
      <div class="big-avatar" id="previewAvatar"></div>
      <p>Камера выключена — нажмите кнопку ниже, чтобы включить</p>
    </div>
    <!-- видео вставляется через JS -->
  </div>

  <!-- Кнопки микрофона и камеры -->
  <div class="lobby-controls">

    <button class="lobby-ctrl-btn" id="lobbyMicBtn" title="Включить микрофон">
      <!-- иконка задаётся через JS -->
    </button>

    <button class="lobby-ctrl-btn" id="lobbyCamBtn" title="Включить камеру">
      <!-- иконка задаётся через JS -->
    </button>

  </div>

  <!-- Шкала громкости + слайдер усиления -->
  <div class="mic-meter-section" id="micMeterSection">

    <div class="mic-meter-row">
      <svg class="mic-meter-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
      <div class="mic-meter-bar">
        <div class="mic-meter-fill" id="micMeterFill"></div>
      </div>
    </div>

    <div class="gain-row">
      <span class="gain-label">Громкость микрофона</span>
      <div class="gain-slider-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="gain-icon"><line x1="4" y1="12" x2="12" y2="12"/><line x1="18" y1="12" x2="20" y2="12"/><circle cx="15" cy="12" r="3"/></svg>
        <input type="range" id="micGainSlider" min="0" max="200" value="100" step="5">
        <span class="gain-value" id="gainValue">100%</span>
      </div>
    </div>

    <!-- Подсказка про наушники — показывается когда микрофон включён -->
    <div class="earphone-hint" id="earphoneHint" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>
      Вы слышите свой голос — именно так вас слышат другие участники. Рекомендуется использовать наушники, чтобы избежать эха.
    </div>

  </div>

  <p class="lobby-status" id="lobbyStatus">Проверьте камеру и микрофон перед входом. Когда будете готовы — нажмите кнопку ниже.</p>

  <!-- Кнопка входа -->
  <button class="lobby-join-btn" id="lobbyJoinBtn">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
    Войти в комнату
  </button>

</div>

<script src="avatars.js"></script>
<script src="lobby.js"></script>
</body>
</html>
