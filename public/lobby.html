<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1117">
<title>VisionCall — Настройка перед входом</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body class="lobby-page">

<div class="lobby-card">

  <div class="lobby-header">
    <div class="logo-text">VisionCall</div>
    <div class="lobby-user" id="lobbyUser">
      <div class="lobby-user-avatar" id="lobbyAvatar"></div>
      <span id="lobbyName"></span>
    </div>
  </div>

  <!-- Превью камеры -->
  <div class="lobby-preview" id="lobbyPreview">
    <div class="lobby-preview-off" id="previewOff">
      <div class="big-avatar" id="previewAvatar"></div>
      <p>Камера выключена — нажмите кнопку ниже, чтобы включить</p>
    </div>
    <!-- видео вставляется через JS -->
  </div>

  <!-- Кнопки микрофона, камеры и шумоподавления -->
  <div class="lobby-controls">

    <button class="lobby-ctrl-btn" id="lobbyMicBtn" title="Включить микрофон" aria-label="Включить микрофон" aria-pressed="false">
      <!-- иконка задаётся через JS -->
    </button>

    <button class="lobby-ctrl-btn" id="lobbyCamBtn" title="Включить камеру" aria-label="Включить камеру" aria-pressed="false">
      <!-- иконка задаётся через JS -->
    </button>

    <!-- Шумоподавление -->
    <button class="lobby-ctrl-btn active" id="lobbyNoiseBtn" title="Шумоподавление включено" aria-label="Шумоподавление включено" aria-pressed="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 9v6"/><path d="M12 5v14"/><path d="M15 9v6"/>
        <path d="M3 12h3"/><path d="M18 12h3"/>
        <line x1="2" y1="2" x2="22" y2="22" style="display:none" id="noiseBtnCross"/>
      </svg>
    </button>

  </div>

  <!-- Проверка звука микрофона — визуализация + оценка качества -->
  <div class="mic-meter-section" id="micMeterSection">

    <!-- Waveform canvas -->
    <div class="mic-waveform-wrap">
      <canvas id="micWaveform" class="mic-waveform-canvas" width="400" height="56" aria-label="Визуализация звука микрофона"></canvas>
    </div>

    <!-- Оценка качества -->
    <div class="mic-quality-row" id="micQualityRow">
      <span class="mic-quality-dot" id="micQualityDot"></span>
      <span class="mic-quality-text" id="micQualityText">Говорите что-нибудь…</span>
    </div>

    <!-- Проверка динамика -->
    <div class="speaker-test-row">
      <button class="speaker-test-btn" id="speakerTestBtn" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8a6 6 0 0 1 0 8"/><path d="M22 5a10 10 0 0 1 0 14"/>
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        </svg>
        Проверить динамик
      </button>
      <span class="speaker-test-hint" id="speakerTestHint"></span>
    </div>

    <!-- Слайдер громкости микрофона -->
    <div class="gain-row">
      <span class="gain-label">Громкость микрофона</span>
      <div class="gain-slider-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="gain-icon"><line x1="4" y1="12" x2="12" y2="12"/><line x1="18" y1="12" x2="20" y2="12"/><circle cx="15" cy="12" r="3"/></svg>
        <input type="range" id="micGainSlider" min="0" max="200" value="100" step="5">
        <span class="gain-value" id="gainValue">100%</span>
      </div>
    </div>

  </div>

  <!-- #77 — aria-live: скринридеры объявляют изменения статуса -->
  <p class="lobby-status" id="lobbyStatus" aria-live="polite">Проверьте камеру и микрофон перед входом. Когда будете готовы — нажмите кнопку ниже.</p>

  <!-- Кнопка входа -->
  <button class="lobby-join-btn" id="lobbyJoinBtn">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
    Войти в комнату
  </button>

</div>

<script src="avatars.js"></script>
<script src="lobby.js"></script>
</body>
</html>
