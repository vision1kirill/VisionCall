<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="ring5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:white; stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:white; stop-opacity:0.2"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bg5)"/>
  <!-- Outer signal ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="white" stroke-width="1.5" opacity="0.2"/>
  <!-- Middle signal ring -->
  <circle cx="32" cy="32" r="21" fill="none" stroke="white" stroke-width="1.5" opacity="0.35"/>
  <!-- Inner fill area -->
  <circle cx="32" cy="32" r="15" fill="white" opacity="0.12"/>
  <!-- Camera body -->
  <rect x="18" y="23" width="20" height="16" rx="3.5" fill="white"/>
  <!-- Camera lens -->
  <circle cx="28" cy="31" r="5" fill="url(#bg5)"/>
  <circle cx="28" cy="31" r="2.5" fill="white" opacity="0.9"/>
  <!-- Video wing -->
  <polygon points="40,25 48,29 48,35 40,39" fill="white" opacity="0.85"/>
</svg>
