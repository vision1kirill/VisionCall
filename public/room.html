<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VisionCall</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ── ШАПКА ── -->
<div class="topbar">

  <div class="logo">VisionCall</div>

  <div class="room-info">
    <span id="roomTitle"></span>
  </div>

  <div></div>

</div>

<!-- ── ОСНОВНАЯ ОБЛАСТЬ ── -->
<div class="main">

  <div class="video-grid" id="videoGrid"></div>

  <div class="sidebar">

    <div class="participants">
      <h3>Участники</h3>
      <div id="participants"></div>
    </div>

    <div class="chat">
      <div class="chat-header">Чат</div>
      <div id="messages"></div>
      <div class="chat-input">
        <label for="msgInput" class="sr-only">Введите сообщение</label>
        <input id="msgInput" placeholder="Сообщение…" autocomplete="off" maxlength="2000">
        <button id="sendBtn" aria-label="Отправить сообщение">
          <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>

  </div>

</div>

<!-- ── ПАНЕЛЬ УПРАВЛЕНИЯ ── -->
<div class="controls">

  <button id="micBtn" aria-label="Включить микрофон" aria-pressed="false" title="Включить / выключить микрофон">
    <!-- иконка задаётся через app.js -->
  </button>

  <button id="camBtn" aria-label="Включить камеру" aria-pressed="false" title="Включить / выключить камеру">
    <!-- иконка задаётся через app.js -->
  </button>

  <button id="flipBtn" aria-label="Переключить камеру" title="Переключить переднюю / заднюю камеру" style="display:none">
    <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
  </button>

  <button id="screenBtn" aria-label="Начать демонстрацию экрана" aria-pressed="false" title="Показать ваш экран участникам конференции">
    <!-- иконка задаётся через app.js -->
  </button>

  <!-- Кнопка копирования ссылки — перенесена из топбара -->
  <button id="copyBtn" aria-label="Скопировать ссылку на комнату" title="Скопировать ссылку для приглашения участников">
    <!-- иконка задаётся через app.js -->
  </button>

  <button id="chatBtn" aria-label="Открыть чат" aria-pressed="false" title="Открыть / закрыть текстовый чат">
    <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
  </button>

  <button id="leaveBtn" aria-label="Покинуть звонок" title="Покинуть конференцию">
    <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
  </button>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="avatars.js"></script>
<script src="app.js"></script>
<script src="chat.js"></script>

</body>
</html>
