<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="iris2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <radialGradient id="shine2" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:white; stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:white; stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg2)"/>
  <!-- Eye outline (white/glow) -->
  <path d="M8,32 Q32,8 56,32 Q32,56 8,32 Z" fill="none" stroke="#6366f1" stroke-width="2.5"/>
  <!-- Eye white area -->
  <path d="M10,32 Q32,12 54,32 Q32,52 10,32 Z" fill="#1e1b4b"/>
  <!-- Iris -->
  <circle cx="32" cy="32" r="11" fill="url(#iris2)"/>
  <!-- Pupil -->
  <circle cx="32" cy="32" r="6" fill="#08091a"/>
  <!-- V shape inside pupil -->
  <polyline points="27,29 32,35 37,29" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Shine -->
  <circle cx="32" cy="32" r="11" fill="url(#shine2)"/>
  <!-- Eye lashes / sparkle dots -->
  <circle cx="32" cy="18" r="1.2" fill="#6366f1" opacity="0.7"/>
  <circle cx="32" cy="46" r="1.2" fill="#6366f1" opacity="0.7"/>
</svg>
