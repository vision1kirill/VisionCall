<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg1)"/>
  <!-- Camera body -->
  <rect x="8" y="20" width="36" height="26" rx="5" fill="url(#glow1)"/>
  <!-- Camera lens -->
  <circle cx="26" cy="33" r="8" fill="#6366f1"/>
  <circle cx="26" cy="33" r="5" fill="#08091a"/>
  <circle cx="23.5" cy="30.5" r="1.5" fill="white" opacity="0.6"/>
  <!-- Video triangle (right side) -->
  <polygon points="48,23 60,29 60,39 48,45" rx="2" fill="url(#glow1)" opacity="0.9"/>
  <!-- Lens shine -->
  <circle cx="26" cy="33" r="8" fill="none" stroke="white" stroke-width="0.5" opacity="0.3"/>
</svg>
