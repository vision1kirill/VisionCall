<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VisionCall</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="style.css">
</head>
<body class="home">

<!-- ── ОБЫЧНАЯ ГЛАВНАЯ (без ?room= параметра) ── -->
<div class="join-card" id="homeCard">

  <div class="logo-text">VisionCall</div>

  <!-- Онлайн-счётчик -->
  <div class="online-counter-wrap">
    <div class="online-dot"></div>
    <div class="flip-counter" id="onlineFlipCounter">
      <span class="flip-digit"><span class="digit-val">0</span></span>
    </div>
    <span class="online-label">онлайн</span>
  </div>

  <input id="nickname" placeholder="Введите ваше имя" type="text" autocomplete="off" maxlength="64">
  <p class="input-hint" id="nicknameHint">Пожалуйста, введите ваше имя — его увидят другие участники</p>

  <!-- Рандомный аватар + кубик -->
  <div class="avatar-random-section">
    <div class="avatar-random-display" id="avatarDisplayHome"></div>
    <div class="avatar-random-label" id="avatarLabelHome"></div>
    <button type="button" class="dice-btn" id="diceBtnHome" title="Выбрать другого Мстителя">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="4"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor" stroke="none"/><circle cx="15.5" cy="8.5" r="1.5" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="8.5" cy="15.5" r="1.5" fill="currentColor" stroke="none"/><circle cx="15.5" cy="15.5" r="1.5" fill="currentColor" stroke="none"/></svg>
      Другой Мститель
    </button>
  </div>
  <input type="hidden" id="avatar" value="ironman">

  <div class="home-actions">
    <div class="action-section">
      <p class="section-label">Создать новую комнату</p>
      <button class="join-btn create-btn" onclick="createRoom()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Создать комнату
      </button>
    </div>
  </div>
</div>

<!-- ── ВХОД ПО ССЫЛКЕ (есть ?room= параметр) ── -->
<div class="join-card" id="linkCard" style="display:none">

  <div class="logo-text">VisionCall</div>
  <p class="link-join-heading">Вас пригласили в комнату</p>

  <div class="link-join-room-badge" id="roomBadge">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    <span id="roomCodeDisplay"></span>
  </div>

  <input id="nicknameLink" placeholder="Введите ваше имя" type="text" autocomplete="off" maxlength="64">
  <p class="input-hint" id="nicknameLinkHint">Пожалуйста, введите ваше имя — его увидят другие участники</p>

  <!-- Рандомный аватар + кубик -->
  <div class="avatar-random-section">
    <div class="avatar-random-display" id="avatarDisplayLink"></div>
    <div class="avatar-random-label" id="avatarLabelLink"></div>
    <button type="button" class="dice-btn" id="diceBtnLink" title="Выбрать другого Мстителя">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="4"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor" stroke="none"/><circle cx="15.5" cy="8.5" r="1.5" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="8.5" cy="15.5" r="1.5" fill="currentColor" stroke="none"/><circle cx="15.5" cy="15.5" r="1.5" fill="currentColor" stroke="none"/></svg>
      Другой Мститель
    </button>
  </div>
  <input type="hidden" id="avatarLink" value="ironman">

  <button class="join-btn" onclick="joinViaLink()">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
    Войти в конференцию
  </button>

</div>

<script src="avatars.js"></script>
<script>
/* ════════════════════════════════════════
   РАНДОМНЫЙ АВАТАР + КУБИК
════════════════════════════════════════ */
const AVATAR_SAVED_KEY = "vc_avatar";

function getRandomAvatarKey(exclude) {
    const keys = Object.keys(window.AVATARS || {});
    if (!keys.length) return "ironman";
    const pool = keys.length > 1 ? keys.filter(k => k !== exclude) : keys;
    return pool[Math.floor(Math.random() * pool.length)];
}

/* Анимация прокрутки аватарок — эффект слот-машины */
const ROLL_DELAYS = [55,55,60,65,70,80,95,115,140,170,210,260,320,400];

function rollDice(displayEl, labelEl, hiddenInputEl, btnEl) {
    if (btnEl) btnEl.disabled = true;
    const keys = Object.keys(window.AVATARS || {});
    if (!keys.length) { if (btnEl) btnEl.disabled = false; return; }

    const total    = ROLL_DELAYS.length;
    let   count    = 0;
    const finalKey = getRandomAvatarKey(hiddenInputEl.value);

    function step() {
        const key = (count === total - 1)
            ? finalKey
            : keys[Math.floor(Math.random() * keys.length)];

        displayEl.innerHTML = window.AVATARS[key];
        hiddenInputEl.value = key; /* всегда актуальное значение, даже в процессе анимации */
        displayEl.classList.remove("avatar-rolling");
        void displayEl.offsetWidth; /* принудительный reflow для перезапуска анимации */
        displayEl.classList.add("avatar-rolling");

        if (count === total - 1) {
            if (labelEl) labelEl.textContent = window.AVATAR_LABELS?.[finalKey] || finalKey;
            localStorage.setItem(AVATAR_SAVED_KEY, finalKey);
            if (btnEl) btnEl.disabled = false;
            return;
        }
        count++;
        setTimeout(step, ROLL_DELAYS[count]);
    }
    step();
}

function setAvatar(displayEl, labelEl, hiddenInputEl, key) {
    if (!window.AVATARS || !window.AVATARS[key]) return;
    displayEl.innerHTML = window.AVATARS[key];
    if (labelEl) labelEl.textContent = window.AVATAR_LABELS?.[key] || key;
    hiddenInputEl.value = key;
}

function initRandomAvatar(displayId, labelId, hiddenId, diceBtnId) {
    const displayEl  = document.getElementById(displayId);
    const labelEl    = document.getElementById(labelId);
    const hiddenEl   = document.getElementById(hiddenId);
    const diceBtn    = document.getElementById(diceBtnId);
    if (!displayEl || !hiddenEl || !window.AVATARS) return;

    /* Восстанавливаем сохранённый аватар или берём случайный */
    const saved = localStorage.getItem(AVATAR_SAVED_KEY);
    const key   = (saved && window.AVATARS[saved]) ? saved : getRandomAvatarKey();
    setAvatar(displayEl, labelEl, hiddenEl, key);

    if (diceBtn) {
        diceBtn.onclick = () => rollDice(displayEl, labelEl, hiddenEl, diceBtn);
    }
}

initRandomAvatar("avatarDisplayHome", "avatarLabelHome", "avatar",     "diceBtnHome");
initRandomAvatar("avatarDisplayLink", "avatarLabelLink", "avatarLink", "diceBtnLink");

/* ── Запоминание ника (localStorage) ── */
const NICK_KEY = "vc_nickname";
const savedNick = localStorage.getItem(NICK_KEY);
if (savedNick) {
    document.getElementById("nickname").value     = savedNick;
    document.getElementById("nicknameLink").value = savedNick;
}

/* ── Сброс ошибки при вводе ── */
["nickname", "nicknameLink"].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.oninput = () => {
        el.classList.remove("input-error");
        const hintEl = el.nextElementSibling;
        if (hintEl && hintEl.classList.contains("input-hint")) hintEl.style.display = "none";
    };
});

/* ── Определяем режим: обычный или по ссылке ── */
const urlParams = new URLSearchParams(window.location.search);
const preRoom = urlParams.get("room");

if (preRoom) {
    document.getElementById("homeCard").style.display = "none";
    document.getElementById("linkCard").style.display = "";
    document.getElementById("roomCodeDisplay").textContent = preRoom;
}

/* ── Вспомогательные функции ── */
function generateCode() {
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    let code = "";
    for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
    return code;
}

function getNickname(inputId) {
    const input = document.getElementById(inputId);
    const name  = input.value.trim();
    if (!name) {
        input.classList.add("input-error");
        input.focus();
        const hintEl = input.nextElementSibling;
        if (hintEl && hintEl.classList.contains("input-hint")) {
            hintEl.style.display = "block";
        }
        return null;
    }
    input.classList.remove("input-error");
    return name;
}

/* ── Создать комнату ── */
function createRoom() {
    const name = getNickname("nickname");
    if (!name) return;
    localStorage.setItem(NICK_KEY, name);
    const avatar = document.getElementById("avatar").value;
    const room = generateCode();
    goToLobby(room, name, avatar);
}

/* ── Войти по ссылке (карточка link-join) ── */
function joinViaLink() {
    const name = getNickname("nicknameLink");
    if (!name) return;
    localStorage.setItem(NICK_KEY, name);
    const avatar = document.getElementById("avatarLink").value;
    goToLobby(preRoom, name, avatar);
}

/* ── Перейти в лобби ── */
function goToLobby(room, name, avatar) {
    window.location = `/lobby.html?room=${encodeURIComponent(room)}&name=${encodeURIComponent(name)}&avatar=${encodeURIComponent(avatar)}`;
}

/* ── Онлайн-счётчик с flip-анимацией ── */
let lastOnline = -1;

function renderFlipCounter(el, newVal) {
    const str = String(Math.max(0, newVal));
    const cur = el.querySelectorAll(".flip-digit");
    /* adjust digit count */
    while (el.children.length < str.length) {
        const d = document.createElement("span");
        d.className = "flip-digit";
        d.innerHTML = '<span class="digit-val">0</span>';
        el.prepend(d);
    }
    while (el.children.length > str.length) el.firstChild.remove();
    [...el.querySelectorAll(".flip-digit")].forEach((d, i) => {
        const v = d.querySelector(".digit-val");
        if (!v) return;
        if (v.textContent !== str[i]) {
            v.textContent = str[i];
            d.classList.remove("flipping");
            void d.offsetWidth; /* force reflow */
            d.classList.add("flipping");
        }
    });
}

function pollOnline() {
    fetch("/api/online")
        .then(r => r.json())
        .then(data => {
            const count = typeof data.online === "number" ? data.online : 0;
            if (count !== lastOnline) {
                lastOnline = count;
                const el = document.getElementById("onlineFlipCounter");
                if (el) renderFlipCounter(el, count);
            }
        })
        .catch(() => {});
}
/* Only poll on the home card page */
if (!preRoom) {
    pollOnline();
    setInterval(pollOnline, 6000);
}
</script>

</body>
</html>
