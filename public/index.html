<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VisionCall</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="home">

<!-- ── NORMAL HOME (no ?room= param) ── -->
<div class="join-card" id="homeCard">

  <div class="logo-text">VisionCall</div>

  <input id="nickname" placeholder="Your nickname" type="text" autocomplete="off">

  <div class="emoji-picker">
    <span class="emoji selected">😀</span>
    <span class="emoji">😎</span>
    <span class="emoji">🤖</span>
    <span class="emoji">👾</span>
    <span class="emoji">🐱</span>
    <span class="emoji">🐼</span>
    <span class="emoji">🦊</span>
    <span class="emoji">🐸</span>
  </div>
  <input type="hidden" id="avatar" value="😀">

  <div class="home-actions">

    <div class="action-section">
      <p class="section-label">Create a new room</p>
      <button class="join-btn create-btn" onclick="createRoom()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Create Room
      </button>
    </div>

    <div class="home-divider">or</div>

    <div class="action-section">
      <p class="section-label">Join an existing room</p>
      <input id="roomInput" placeholder="Room code or link" type="text" autocomplete="off">
      <button class="join-btn" onclick="joinRoom()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Join Room
      </button>
    </div>

  </div>
</div>

<!-- ── LINK-JOIN CARD (has ?room= param) ── -->
<div class="join-card" id="linkCard" style="display:none">

  <div class="logo-text">VisionCall</div>
  <p class="link-join-heading">You were invited to join a room</p>

  <div class="link-join-room-badge" id="roomBadge">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    <span id="roomCodeDisplay"></span>
  </div>

  <input id="nicknameLink" placeholder="Your nickname" type="text" autocomplete="off">

  <div class="emoji-picker" id="emojiPickerLink">
    <span class="emoji selected">😀</span>
    <span class="emoji">😎</span>
    <span class="emoji">🤖</span>
    <span class="emoji">👾</span>
    <span class="emoji">🐱</span>
    <span class="emoji">🐼</span>
    <span class="emoji">🦊</span>
    <span class="emoji">🐸</span>
  </div>
  <input type="hidden" id="avatarLink" value="😀">

  <button class="join-btn" onclick="joinViaLink()">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
    Continue to Preview
  </button>

</div>

<script>
/* ── Emoji pickers ── */
function initPicker(pickerSelector, hiddenId) {
    const emojis = document.querySelectorAll(pickerSelector + " .emoji");
    emojis.forEach(e => {
        e.onclick = () => {
            emojis.forEach(x => x.classList.remove("selected"));
            e.classList.add("selected");
            document.getElementById(hiddenId).value = e.innerText;
        };
    });
}
initPicker(".join-card#homeCard .emoji-picker", "avatar");
initPicker(".join-card#linkCard .emoji-picker", "avatarLink");

/* ── Detect link-join mode ── */
const urlParams = new URLSearchParams(window.location.search);
const preRoom = urlParams.get("room");

if (preRoom) {
    document.getElementById("homeCard").style.display = "none";
    document.getElementById("linkCard").style.display = "";
    document.getElementById("roomCodeDisplay").textContent = preRoom;
}

/* ── Helpers ── */
function generateCode() {
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    let code = "";
    for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
    return code;
}

function getNickname(inputId) {
    const name = document.getElementById(inputId).value.trim();
    if (!name) { alert("Please enter a nickname"); return null; }
    return name;
}

/* ── Create room ── */
function createRoom() {
    const name = getNickname("nickname");
    if (!name) return;
    const avatar = document.getElementById("avatar").value;
    const room = generateCode();
    goToLobby(room, name, avatar);
}

/* ── Join room (from code/link input) ── */
function joinRoom() {
    const name = getNickname("nickname");
    if (!name) return;
    const avatar = document.getElementById("avatar").value;
    let input = document.getElementById("roomInput").value.trim();
    if (!input) { alert("Enter a room code or link"); return; }
    let room = input;
    try {
        const url = new URL(input);
        const r = url.searchParams.get("room");
        if (r) room = r;
    } catch(e) { /* plain code */ }
    goToLobby(room, name, avatar);
}

/* ── Join via link (link-join card) ── */
function joinViaLink() {
    const name = getNickname("nicknameLink");
    if (!name) return;
    const avatar = document.getElementById("avatarLink").value;
    goToLobby(preRoom, name, avatar);
}

/* ── Redirect to lobby ── */
function goToLobby(room, name, avatar) {
    window.location = `/lobby.html?room=${encodeURIComponent(room)}&name=${encodeURIComponent(name)}&avatar=${encodeURIComponent(avatar)}`;
}
</script>

</body>
</html>
