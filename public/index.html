<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1117">
<title>VisionCall — Бесплатные видеозвонки онлайн</title>
<meta name="description" content="VisionCall — бесплатные защищённые видеоконференции до 8 участников. Демонстрация экрана, чат, не нужно скачивать приложение. Работает прямо в браузере.">
<meta name="keywords" content="видеозвонки, видеоконференции, бесплатно, онлайн, созвон, VisionCall">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://visioncall.ru/">
<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://visioncall.ru/">
<meta property="og:title" content="VisionCall — Бесплатные видеозвонки онлайн">
<meta property="og:description" content="Бесплатные защищённые видеоконференции до 8 участников. Работает прямо в браузере — без установки.">
<meta property="og:image" content="https://visioncall.ru/og-image.png">
<meta property="og:locale" content="ru_RU">
<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="VisionCall — Бесплатные видеозвонки">
<meta name="twitter:description" content="Бесплатные защищённые видеоконференции до 8 участников. Прямо в браузере.">
<meta name="twitter:image" content="https://visioncall.ru/og-image.png">
<!-- Icons -->
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="style.css">
<script src="theme.js"></script>
<!-- JSON-LD Structured Data — улучшает отображение в поисковиках -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "VisionCall",
  "url": "https://visioncall.ru/",
  "description": "Бесплатные защищённые видеоконференции до 8 участников. Работает прямо в браузере без установки.",
  "applicationCategory": "CommunicationApplication",
  "operatingSystem": "Any",
  "offers": {
    "@type": "Offer",
    "price": "0",
    "priceCurrency": "RUB"
  },
  "featureList": "Видеозвонки, аудиозвонки, демонстрация экрана, текстовый чат",
  "inLanguage": "ru"
}
</script>
</head>
<body class="home">
<noscript><div style="padding:20px;text-align:center;background:#1a1a2e;color:#e2e8f0;font-family:sans-serif">Для работы VisionCall необходим JavaScript. Пожалуйста, включите его в настройках браузера.</div></noscript>

<!-- ── ОБЫЧНАЯ ГЛАВНАЯ (без ?room= параметра) ── -->
<div class="join-card" id="homeCard">

  <div class="logo-text">VisionCall</div>

  <!-- Онлайн-счётчик -->
  <!-- #82 — aria-live: скринридеры объявляют изменения счётчика -->
  <div class="online-counter-wrap" aria-live="polite" aria-atomic="true" aria-label="Пользователей онлайн">
    <div class="online-dot"></div>
    <div class="flip-counter" id="onlineFlipCounter">
      <span class="flip-digit"><span class="digit-val">0</span></span>
    </div>
    <span class="online-label">онлайн</span>
  </div>

  <!-- #89 — enterkeyhint подсказывает мобильной клавиатуре показывать «Перейти» вместо «Ввод» -->
  <input id="nickname" placeholder="Введите ваше имя" type="text" autocomplete="off" maxlength="64" enterkeyhint="go" aria-label="Ваше имя">
  <p class="input-hint" id="nicknameHint">Пожалуйста, введите ваше имя — его увидят другие участники</p>


  <div class="home-actions">
    <div class="action-section">
      <p class="section-label">Создать новую комнату</p>
      <button class="join-btn create-btn" onclick="createRoom()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Создать комнату
      </button>
    </div>
  </div>
</div>

<!-- ── ВХОД ПО ССЫЛКЕ (есть ?room= параметр) ── -->
<div class="join-card" id="linkCard" style="display:none">

  <div class="logo-text">VisionCall</div>
  <p class="link-join-heading">Вас пригласили в комнату</p>

  <div class="link-join-room-badge" id="roomBadge">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    <span id="roomCodeDisplay"></span>
  </div>

  <input id="nicknameLink" placeholder="Введите ваше имя" type="text" autocomplete="off" maxlength="64" enterkeyhint="go" aria-label="Ваше имя">
  <p class="input-hint" id="nicknameLinkHint">Пожалуйста, введите ваше имя — его увидят другие участники</p>


  <button class="join-btn" onclick="joinViaLink()">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
    Войти в конференцию
  </button>

</div>

<script>
/* ── Запоминание ника (localStorage) ── */
const NICK_KEY = "vc_nickname";
/* #79-80 — try-catch для localStorage: в Safari Private Mode/iframe он недоступен */
let savedNick = null;
try { savedNick = localStorage.getItem(NICK_KEY); } catch (_) {}
if (savedNick) {
    document.getElementById("nickname").value     = savedNick;
    document.getElementById("nicknameLink").value = savedNick;
}

/* ── Сброс ошибки при вводе ── */
["nickname", "nicknameLink"].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.oninput = () => {
        el.classList.remove("input-error");
        const hintEl = el.nextElementSibling;
        if (hintEl && hintEl.classList.contains("input-hint")) hintEl.style.display = "none";
    };
});

/* ── Определяем режим: обычный или по ссылке ── */
const urlParams = new URLSearchParams(window.location.search);
const preRoom = urlParams.get("room");

/* Допустимый формат кода комнаты: ровно 6 символов из алфавита сервера.
   Любой другой формат — либо опечатка, либо попытка фишинга. */
const ROOM_CODE_RE = /^[ABCDEFGHJKLMNPQRSTUVWXYZ23456789]{6}$/;

if (preRoom) {
    if (!ROOM_CODE_RE.test(preRoom)) {
        /* Невалидный формат → молча редиректим на главную, не показываем инвайт */
        window.location.replace("/");
    } else {
        /* Валидный формат → проверяем существование комнаты на сервере */
        fetch("/api/room-exists?code=" + encodeURIComponent(preRoom))
            .then(r => r.ok ? r.json() : { exists: false })
            .then(({ exists }) => {
                if (!exists) {
                    /* Комната не найдена → показываем ошибку вместо инвайта */
                    document.getElementById("homeCard").style.display = "none";
                    const errCard = document.getElementById("linkCard");
                    errCard.style.display = "";
                    errCard.innerHTML = `
                        <div class="logo-text">VisionCall</div>
                        <p class="link-join-heading" style="color:#f87171">Комната не найдена</p>
                        <p style="font-size:14px;color:var(--text-muted);text-align:center;margin-bottom:24px">
                            Ссылка устарела или комната уже закрыта.
                        </p>
                        <a href="/" class="join-btn" style="text-decoration:none;display:flex;align-items:center;justify-content:center;gap:8px">
                            На главную
                        </a>`;
                } else {
                    document.getElementById("homeCard").style.display = "none";
                    document.getElementById("linkCard").style.display = "";
                    document.getElementById("roomCodeDisplay").textContent = preRoom;
                }
            })
            .catch(() => {
                /* Сеть недоступна — показываем инвайт, сервер дополнительно проверит при join */
                document.getElementById("homeCard").style.display = "none";
                document.getElementById("linkCard").style.display = "";
                document.getElementById("roomCodeDisplay").textContent = preRoom;
            });
    }
}

/* ── Вспомогательные функции ── */
function getNickname(inputId) {
    const input = document.getElementById(inputId);
    if (!input) return null;   /* null guard: элемент может отсутствовать */
    const name  = input.value.trim();
    if (!name) {
        input.classList.add("input-error");
        input.focus();
        const hintEl = input.nextElementSibling;
        if (hintEl && hintEl.classList.contains("input-hint")) {
            hintEl.style.display = "block";
        }
        return null;
    }
    input.classList.remove("input-error");
    return name;
}

/* ── Создать комнату ── */
async function createRoom() {
    const name = getNickname("nickname");
    if (!name) return;
    try { localStorage.setItem(NICK_KEY, name); } catch (_) {}

    /* Блокируем кнопку пока сервер генерирует код */
    const btn = document.querySelector(".create-btn");
    if (btn) { btn.disabled = true; btn.style.opacity = "0.6"; }

    try {
        const resp = await fetch("/api/create-room", { method: "POST" });
        if (!resp.ok) throw new Error(resp.status);
        const { room } = await resp.json();
        goToLobby(room, name);
    } catch (_) {
        if (btn) { btn.disabled = false; btn.style.opacity = ""; }
        let errEl = document.getElementById("createRoomErr");
        if (!errEl) {
            errEl = document.createElement("p");
            errEl.id = "createRoomErr";
            errEl.style.cssText = "color:#f87171;font-size:13px;margin-top:8px;text-align:center";
            btn?.parentNode?.appendChild(errEl);
        }
        errEl.textContent = "Не удалось создать комнату. Попробуйте ещё раз.";
        setTimeout(() => errEl?.remove(), 5000);
    }
}

/* ── Войти по ссылке (карточка link-join) ── */
function joinViaLink() {
    const name = getNickname("nicknameLink");
    if (!name) return;
    /* #79 — try-catch для localStorage */
    try { localStorage.setItem(NICK_KEY, name); } catch (_) {}
    goToLobby(preRoom, name);
}

/* ── Перейти в лобби ── */
function goToLobby(room, name) {
    /* S13: Обрезаем имя до 64 символов на JS-уровне — независимо от maxlength атрибута.
       HTML maxlength легко обходится через DevTools или прямым запросом. */
    const safeName = String(name).slice(0, 64);
    window.location = `/lobby.html?room=${encodeURIComponent(room)}&name=${encodeURIComponent(safeName)}`;
}

/* ── Онлайн-счётчик с flip-анимацией ── */
let lastOnline = -1;

function renderFlipCounter(el, newVal) {
    const str = String(Math.max(0, newVal));
    const cur = el.querySelectorAll(".flip-digit");
    /* adjust digit count */
    while (el.children.length < str.length) {
        const d = document.createElement("span");
        d.className = "flip-digit";
        d.innerHTML = '<span class="digit-val">0</span>';
        el.prepend(d);
    }
    while (el.children.length > str.length) el.firstChild.remove();
    [...el.querySelectorAll(".flip-digit")].forEach((d, i) => {
        const v = d.querySelector(".digit-val");
        if (!v) return;
        if (v.textContent !== str[i]) {
            v.textContent = str[i];
            d.classList.remove("flipping");
            void d.offsetWidth; /* force reflow */
            d.classList.add("flipping");
        }
    });
}

function pollOnline() {
    fetch("/api/online")
        .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(data => {
            const count = typeof data.online === "number" ? data.online : 0;
            if (count !== lastOnline) {
                lastOnline = count;
                const el = document.getElementById("onlineFlipCounter");
                if (el) renderFlipCounter(el, count);
            }
        })
        .catch(() => {});
}
/* ── Service Worker ── */
if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("/service-worker.js").catch(() => {});
    });
}

/* Only poll on the home card page */
if (!preRoom) {
    pollOnline();
    /* #81 — Сохраняем ID интервала и очищаем при выгрузке страницы */
    const pollIntervalId = setInterval(pollOnline, 6000);
    window.addEventListener("pagehide", () => clearInterval(pollIntervalId), { once: true });

    /* Пауза пульсирующей анимации когда вкладка не видна — экономим CPU/battery */
    const dot = document.querySelector(".online-dot");
    if (dot) {
        document.addEventListener("visibilitychange", () => {
            dot.style.animationPlayState = document.hidden ? "paused" : "running";
        });
    }
}
</script>

</body>
</html>
