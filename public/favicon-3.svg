<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="v3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:white"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>
  </defs>
  <!-- Background circle (no square — pure circle for a modern badge look) -->
  <circle cx="32" cy="32" r="32" fill="url(#bg3)"/>
  <!-- Subtle inner glow ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="white" stroke-width="0.5" opacity="0.2"/>
  <!-- Bold V letterform -->
  <path d="M14,14 L32,50 L50,14" fill="none" stroke="url(#v3)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small signal dot at top-right of V -->
  <circle cx="50" cy="14" r="4" fill="white" opacity="0.9"/>
  <circle cx="50" cy="14" r="7" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <circle cx="50" cy="14" r="10" fill="none" stroke="white" stroke-width="1" opacity="0.2"/>
</svg>
