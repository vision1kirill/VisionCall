<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="iris" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="shine" cx="35%" cy="35%">
      <stop offset="0%" stop-color="white" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Eye whites area -->
  <path d="M10,32 Q32,12 54,32 Q32,52 10,32 Z" fill="#1e1b4b"/>
  <!-- Eye outline glow -->
  <path d="M8,32 Q32,8 56,32 Q32,56 8,32 Z" fill="none" stroke="#6366f1" stroke-width="2.5"/>
  <!-- Iris -->
  <circle cx="32" cy="32" r="11" fill="url(#iris)"/>
  <!-- Shine overlay on iris -->
  <circle cx="32" cy="32" r="11" fill="url(#shine)"/>
  <!-- Pupil -->
  <circle cx="32" cy="32" r="6" fill="#0a0a1a"/>
  <!-- V shape in pupil (white) -->
  <polyline points="27,29 32,35 37,29" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Top/bottom sparkle dots -->
  <circle cx="32" cy="17" r="1.3" fill="#818cf8" opacity="0.65"/>
  <circle cx="32" cy="47" r="1.3" fill="#818cf8" opacity="0.65"/>
</svg>
