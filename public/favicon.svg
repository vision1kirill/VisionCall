<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141528"/>
      <stop offset="100%" stop-color="#08091a"/>
    </linearGradient>
    <linearGradient id="main" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Subtle top glow -->
  <ellipse cx="32" cy="8" rx="22" ry="14" fill="url(#glow)"/>

  <!-- Subtle border -->
  <rect width="64" height="64" rx="14" fill="none" stroke="rgba(165,180,252,0.14)" stroke-width="1"/>

  <!-- Camera body -->
  <rect x="7" y="19" width="33" height="23" rx="5" fill="url(#main)"/>

  <!-- Camera viewfinder polygon -->
  <polygon points="42,24 57,17 57,47 42,40" fill="url(#main)" opacity="0.88"/>

  <!-- Lens dark housing -->
  <circle cx="23.5" cy="30.5" r="9" fill="#08091a" opacity="0.72"/>

  <!-- Lens colored inner -->
  <circle cx="23.5" cy="30.5" r="5.8" fill="url(#main)" opacity="0.92"/>

  <!-- Lens pupil -->
  <circle cx="23.5" cy="30.5" r="3.1" fill="#08091a"/>

  <!-- Lens highlight -->
  <circle cx="21.2" cy="28.2" r="1.3" fill="white" opacity="0.3"/>

  <!-- Recording dot -->
  <circle cx="12" cy="23.5" r="2.8" fill="#f87171"/>
  <circle cx="12" cy="23.5" r="1.6" fill="#fca5a5" opacity="0.6"/>
</svg>
